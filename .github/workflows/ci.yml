name: CI

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Leak scan
        run: bash .githooks/scan.sh

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: dev/work/watchtower-rs
          cache-on-failure: true

      - name: Format check
        working-directory: dev/work/watchtower-rs
        run: cargo fmt --all --check

      - name: Clippy (warnings = errors)
        working-directory: dev/work/watchtower-rs
        run: cargo clippy --locked -- -D warnings

      - name: Build
        working-directory: dev/work/watchtower-rs
        run: cargo build --locked

      - name: Test
        working-directory: dev/work/watchtower-rs
        run: cargo test --locked

      - name: Security audit
        working-directory: dev/work/watchtower-rs
        run: |
          cargo install cargo-audit --locked --quiet
          cargo audit

  msrv:
    name: MSRV (Rust 1.85)
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: dev/work/watchtower-rs
          cache-on-failure: true

      - name: Check (MSRV)
        working-directory: dev/work/watchtower-rs
        run: cargo check --locked
