name: Release Dev

on:
  workflow_dispatch: {}
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Build
        run: cargo build --locked --release --manifest-path dev/work/watchtower-rs/Cargo.toml
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Test
        run: cargo test --verbose --manifest-path dev/work/watchtower-rs/Cargo.toml
      - name: Publish coverage
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
  publish:
    # Dev builds are tagged :edge in Docker Hub
    needs:
      - build
      - test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.BOT_USERNAME }}
          password: ${{ secrets.BOT_GHCR_PAT }}
      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: dockerfiles/Dockerfile.self-contained
          push: true
          tags: |
            wiki-mod/watch-tower-ng:latest-dev
            ghcr.io/wiki-mod/watch-tower-ng:latest-dev
