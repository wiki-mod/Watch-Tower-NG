version: 2

project_name: watchtower-ng

before:
  hooks:
    - cargo fetch --locked
    - cargo build --locked --release --bin watchtower-rs

builds:
  - id: watchtower-rs-linux-amd64
    main: ./src/main.rs
    binary: watchtower-rs
    goos:
      - linux
    goarch:
      - amd64
    env:
      - WATCHTOWER_VERSION={{.Version}}
  - id: watchtower-rs-linux-386
    main: ./src/main.rs
    binary: watchtower-rs
    goos:
      - linux
    goarch:
      - 386
    env:
      - WATCHTOWER_VERSION={{.Version}}
  - id: watchtower-rs-linux-armv7
    main: ./src/main.rs
    binary: watchtower-rs
    goos:
      - linux
    goarch:
      - arm
    goarm:
      - 7
    env:
      - WATCHTOWER_VERSION={{.Version}}
  - id: watchtower-rs-linux-arm64
    main: ./src/main.rs
    binary: watchtower-rs
    goos:
      - linux
    goarch:
      - arm64
    env:
      - WATCHTOWER_VERSION={{.Version}}
  - id: watchtower-rs-windows-amd64
    main: ./src/main.rs
    binary: watchtower-rs
    goos:
      - windows
    goarch:
      - amd64
    env:
      - WATCHTOWER_VERSION={{.Version}}

release:
  github:
    owner: wiki-mod
    name: Watch-Tower-NG
  draft: false
  prerelease: auto
archives:
  - name_template: >-
      {{- .ProjectName }}_
      {{- if eq .Os "darwin" }}macOS
      {{- else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "arm" }}armhf
      {{- else if eq .Arch "arm64" }}arm64v8
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE.md
dockers:
  # Push platform image to temporary tag (for manifest use)
  - use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
    goos: linux
    goarch: amd64
    goarm: ''
    dockerfile: dockerfiles/Dockerfile
    image_templates:
      - "wiki-mod/watchtower-ng:{{ .Tag }}-amd64-internal"
      - "ghcr.io/wiki-mod/watchtower-ng:{{ .Tag }}-amd64-internal"
    ids:
      - watchtower-rs-linux-amd64
  - use: buildx
    build_flag_templates:
      - "--platform=linux/386"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
    goos: linux
    goarch: 386
    goarm: ''
    dockerfile: dockerfiles/Dockerfile
    image_templates:
      - "wiki-mod/watchtower-ng:{{ .Tag }}-i386-internal"
      - "ghcr.io/wiki-mod/watchtower-ng:{{ .Tag }}-i386-internal"
    ids:
      - watchtower-rs-linux-386
  - use: buildx
    build_flag_templates:
      - "--platform=linux/arm/v7"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
    goos: linux
    goarch: arm
    goarm: 7
    dockerfile: dockerfiles/Dockerfile
    image_templates:
      - "wiki-mod/watchtower-ng:{{ .Tag }}-armhf-internal"
      - "ghcr.io/wiki-mod/watchtower-ng:{{ .Tag }}-armhf-internal"
    ids:
      - watchtower-rs-linux-armv7
  - use: buildx
    build_flag_templates:
      - "--platform=linux/arm64/v8"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
    goos: linux
    goarch: arm64
    goarm: ''
    dockerfile: dockerfiles/Dockerfile
    image_templates:
      - "wiki-mod/watchtower-ng:{{ .Tag }}-arm64v8-internal"
      - "ghcr.io/wiki-mod/watchtower-ng:{{ .Tag }}-arm64v8-internal"
    ids:
      - watchtower-rs-linux-arm64

  # Push latest platform image to temporary tag (for manifest use)
  - use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
    goos: linux
    goarch: amd64
    goarm: ''
    dockerfile: dockerfiles/Dockerfile
    image_templates:
      - "wiki-mod/watchtower-ng:latest-amd64-internal"
      - "ghcr.io/wiki-mod/watchtower-ng:latest-amd64-internal"
    skip_push: "{{ if .Prerelease }}true{{ else }}false{{ end }}"
    ids:
      - watchtower-rs-linux-amd64
  - use: buildx
    build_flag_templates:
      - "--platform=linux/386"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
    goos: linux
    goarch: 386
    goarm: ''
    dockerfile: dockerfiles/Dockerfile
    image_templates:
      - "wiki-mod/watchtower-ng:latest-i386-internal"
      - "ghcr.io/wiki-mod/watchtower-ng:latest-i386-internal"
    skip_push: "{{ if .Prerelease }}true{{ else }}false{{ end }}"
    ids:
      - watchtower-rs-linux-386
  - use: buildx
    build_flag_templates:
      - "--platform=linux/arm/v7"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
    goos: linux
    goarch: arm
    goarm: 7
    dockerfile: dockerfiles/Dockerfile
    image_templates:
      - "wiki-mod/watchtower-ng:latest-armhf-internal"
      - "ghcr.io/wiki-mod/watchtower-ng:latest-armhf-internal"
    skip_push: "{{ if .Prerelease }}true{{ else }}false{{ end }}"
    ids:
      - watchtower-rs-linux-armv7
  - use: buildx
    build_flag_templates:
      - "--platform=linux/arm64/v8"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
    goos: linux
    goarch: arm64
    goarm: ''
    dockerfile: dockerfiles/Dockerfile
    image_templates:
      - "wiki-mod/watchtower-ng:latest-arm64v8-internal"
      - "ghcr.io/wiki-mod/watchtower-ng:latest-arm64v8-internal"
    skip_push: "{{ if .Prerelease }}true{{ else }}false{{ end }}"
    ids:
      - watchtower-rs-linux-arm64

docker_manifests:
  # Publish only one multi-arch tag (version), referencing temporary internal tags
  - name_template: "wiki-mod/watchtower-ng:{{ .Tag }}"
    image_templates:
      - "wiki-mod/watchtower-ng:{{ .Tag }}-amd64-internal"
      - "wiki-mod/watchtower-ng:{{ .Tag }}-i386-internal"
      - "wiki-mod/watchtower-ng:{{ .Tag }}-armhf-internal"
      - "wiki-mod/watchtower-ng:{{ .Tag }}-arm64v8-internal"
    create_flags:
      - --insecure
    push_flags:
      - --insecure
  - name_template: "ghcr.io/wiki-mod/watchtower-ng:{{ .Tag }}"
    image_templates:
      - "ghcr.io/wiki-mod/watchtower-ng:{{ .Tag }}-amd64-internal"
      - "ghcr.io/wiki-mod/watchtower-ng:{{ .Tag }}-i386-internal"
      - "ghcr.io/wiki-mod/watchtower-ng:{{ .Tag }}-armhf-internal"
      - "ghcr.io/wiki-mod/watchtower-ng:{{ .Tag }}-arm64v8-internal"
    create_flags:
      - --insecure
    push_flags:
      - --insecure
  # Publish only one multi-arch latest tag
  - name_template: "wiki-mod/watchtower-ng:latest"
    image_templates:
      - "wiki-mod/watchtower-ng:latest-amd64-internal"
      - "wiki-mod/watchtower-ng:latest-i386-internal"
      - "wiki-mod/watchtower-ng:latest-armhf-internal"
      - "wiki-mod/watchtower-ng:latest-arm64v8-internal"
    create_flags:
      - --insecure
    push_flags:
      - --insecure
    skip_push: "{{ if .Prerelease }}true{{ else }}false{{ end }}"
  - name_template: "ghcr.io/wiki-mod/watchtower-ng:latest"
    image_templates:
      - "ghcr.io/wiki-mod/watchtower-ng:latest-amd64-internal"
      - "ghcr.io/wiki-mod/watchtower-ng:latest-i386-internal"
      - "ghcr.io/wiki-mod/watchtower-ng:latest-armhf-internal"
      - "ghcr.io/wiki-mod/watchtower-ng:latest-arm64v8-internal"
    create_flags:
      - --insecure
    push_flags:
      - --insecure
