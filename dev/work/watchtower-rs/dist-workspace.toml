# cargo-dist workspace configuration
# https://opensource.axo.dev/cargo-dist/book/reference/config.html
#
# Describes release artifact targets for Watch-Tower-NG.
# The actual CI is driven by .github/workflows/release.yml which uses
# `cross` for cross-compilation and mirrors the original goreleaser targets.

[dist]
cargo-dist-version = "0.28.0"

# GitHub Actions is the CI provider
ci = ["github"]

# Server binary — no shell/powershell installers needed
installers = []

# Release targets (musl for Linux = fully static binaries)
targets = [
    "x86_64-unknown-linux-musl",
    "i686-unknown-linux-musl",
    "armv7-unknown-linux-musleabihf",
    "aarch64-unknown-linux-musl",
    "x86_64-pc-windows-msvc",
]

# Do not run dist on PRs — only on tag pushes
pr-run-mode = "skip"

# Allow the release.yml we maintain manually (not auto-generated by cargo-dist)
allow-dirty = ["ci"]
